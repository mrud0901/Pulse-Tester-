services:
  # Backend (Docker - Puppeteer)
  - type: web
    name: pulsetester-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend (Vite React)
  - type: web
    name: pulsetester-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist